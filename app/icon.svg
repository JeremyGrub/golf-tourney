<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!--
    thru. favicon — Course Map flag mark.
    Forest background, cream flagstick, topo-orange pennant, faint cup at
    the base. Designed to read at 16x16 browser-tab size; every element
    is at least 2px wide at that scale so nothing aliases into mush.
  -->
  <rect width="32" height="32" rx="7" fill="#1E3A2B"/>
  <line x1="11" y1="6" x2="11" y2="25" stroke="#FFFDF7" stroke-width="2" stroke-linecap="round"/>
  <path d="M 11 6 L 24 10 L 11 14 Z" fill="#FF6B1A"/>
  <circle cx="11" cy="26" r="1.8" fill="#FFFDF7" fill-opacity="0.5"/>
</svg>
